name: Qket Health Check

on:
  # 처음 테스트하기 위한 임시 조건
  push:
    branches:
      - yunjun
    paths:
      - ".github/workflows/health-check.yml"

  # GitHub Actions 화면에서 직접 실행
  workflow_dispatch:

permissions:
  contents: read

jobs:
  health-check:
    name: Check deployed service
    runs-on: ubuntu-latest

    steps:
      - name: Check frontend
        run: |
          curl --fail --show-error \
            --retry 5 \
            --retry-delay 10 \
            https://app.jun979.click/

      - name: Check backend health
        run: |
          response=$(curl --fail --show-error \
            --retry 5 \
            --retry-delay 10 \
            https://app.jun979.click/api/health)

          echo "Backend response: $response"
          echo "$response" | jq -e '.status == "ok"'
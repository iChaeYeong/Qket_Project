name: Build & Deploy PROD

on:
  push:
    branches:
      - main # main브렌치 Push

  workflow_dispatch:

# [B] 공통 환경변수 - 리전, ECR 경로, 클러스터명, 네임스페이스
env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: team5/ecr/qket
  EKS_CLUSTER_NAME: team5-kube-practice-test
  K8S_NAMESPACE: qket-prod

jobs:
  # 변경 감지 - backend/frontend/그외의것 변경 감지
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend == 'true' || github.event_name == 'workflow_dispatch' }}
      frontend: ${{ steps.filter.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # front 매니페스트 apply - 이미지 무관한 리소스들 (namespace, configmap, secret, ingress 등)
  apply-manifests:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      - name: 1. Apply Namespace
        run: kubectl apply -f k8s/namespace_qKet.yaml

      # ConfigMap - GitHub Variables 에서 민감하지 않은 설정값 주입
      - name: 2. Apply ConfigMap
        run: |
          kubectl create configmap app-config \
            --from-literal=DB_PORT=${{ vars.PROD_DB_PORT }} \
            --from-literal=DB_NAME=${{ vars.PROD_DB_NAME }} \
            --from-literal=REDIS_PORT=${{ vars.PROD_REDIS_PORT }} \
            -n ${{ env.K8S_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      # Secret - GitHub Secrets 에서 DB/Redis 접속 정보 주입
      - name: 3. Apply DB/Redis Secret
        run: |
          kubectl create secret generic db-secrets \
            --from-literal=DB_HOST=${{ secrets.PROD_DB_HOST }} \
            --from-literal=DB_USERNAME=${{ secrets.PROD_DB_USERNAME }} \
            --from-literal=DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }} \
            -n ${{ env.K8S_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic redis-secrets \
            --from-literal=REDIS_HOST=${{ secrets.PROD_REDIS_HOST }} \
            -n ${{ env.K8S_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: 4. Apply Ingress
        run: kubectl apply -f k8s/prod/ingress_https_qket.yaml

      - name: 5. Apply NetworkPolicy
        run: kubectl apply -f k8s/prod/networkpolicy_qKet.yaml

  # 백엔드 빌드/배포 - backend/* 변경 시에만 실행
  build-backend:
    needs: [changes, apply-manifests]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      # ECR 로그인
      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # 이미지 태그: backend-{커밋SHA:앞자리 7글자}
      - name: Build and push backend image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          TAG=backend-$(echo ${{ github.sha }} | cut -c1-7)
          docker build -t $REGISTRY/$ECR_REPOSITORY:$TAG ./backend
          docker push $REGISTRY/$ECR_REPOSITORY:$TAG
          echo "Pushed image: $REGISTRY/$ECR_REPOSITORY:$TAG"

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      # sed로 BACKEND_IMAGE 플레이스홀더를 실제 이미지로 치환 후 apply
      - name: Deploy to EKS
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          TAG=backend-$(echo ${{ github.sha }} | cut -c1-7)
          sed "s|BACKEND_IMAGE|$REGISTRY/$ECR_REPOSITORY:$TAG|" k8s/prod/deploy_https_qKet_backend.yaml | kubectl apply -f -
          kubectl rollout status deployment/qket-backend -n ${{ env.K8S_NAMESPACE }}

  # 프론트엔드 빌드/배포 - frontend/** 변경 시에만 실행
  build-frontend:
    needs: [changes, apply-manifests]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # 이미지 태그: frontend-{커밋SHA}
      - name: Build and push frontend image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          TAG=frontend-$(echo ${{ github.sha }} | cut -c1-7)
          docker build -t $REGISTRY/$ECR_REPOSITORY:$TAG ./frontend
          docker push $REGISTRY/$ECR_REPOSITORY:$TAG
          echo "Pushed image: $REGISTRY/$ECR_REPOSITORY:$TAG"

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      # FRONTEND_IMAGE 플레이스홀더를 실제 이미지로 치환 후 apply
      - name: Deploy to EKS
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          TAG=frontend-$(echo ${{ github.sha }} | cut -c1-7)
          sed "s|FRONTEND_IMAGE|$REGISTRY/$ECR_REPOSITORY:$TAG|" k8s/prod/deploy_https_qKet_frontend.yaml | kubectl apply -f -
          kubectl rollout status deployment/qket-frontend -n ${{ env.K8S_NAMESPACE }}

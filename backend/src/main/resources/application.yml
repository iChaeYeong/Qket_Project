server:
  port: 8080
  servlet:
    context-path: /api

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:qket}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}

  sql:
    init:
      mode: never

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  session:
    store-type: redis
    timeout: 1800s

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus

  endpoint:
    health:
      show-details: never

  metrics:
    tags:
      application: qket-backend
# AWS S3
cloud:
  aws:
    s3:
      bucket: ${S3_BUCKET:qket-posters}
    region:
      static: ${AWS_REGION:ap-northeast-2}
    cloudfront:
      domain: ${CLOUDFRONT_DOMAIN:}

# mybatis
mybatis:
  mapper-locations: com/exam/**/mapper/*.xml
  type-aliases-package: com.exam.common.dto, com.exam.reservation.dto
  map-underscore-to-camel-case: true

spring:
  datasource:
    url: jdbc:mysql://localhost:3308/qket?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 1234

  #schema.sql 과 data.sql 관리 가능 ( always|never )
  sql:
    init:
      mode: never

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  session:
    store-type: redis
    timeout: 1800s

# TodoMapper.xml 과  DTO 별칭 설정
mybatis:
  mapper-locations: com/exam/**/mapper/*.xml
  type-aliases-package: com.exam.common.dto, com.exam.reservation.dto
  map-underscore-to-camel-case: true
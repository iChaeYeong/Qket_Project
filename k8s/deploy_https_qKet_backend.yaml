apiVersion: apps/v1
kind: Deployment
metadata:
  # TODO: nameмқ„ springboot-backendлЎң ліҖкІҪ (account-backendлҠ” кө¬ лұ…нӮ№ м•ұ мқҙлҰ„)
  name: account-backend
  # TODO: л°°нҸ¬ нҷҳкІҪм—җ л”°лқј namespace м§Җм •
  # namespace: qket
spec:
  replicas: 1
  # TODO: prod л°°нҸ¬ мӢң replicas: 2 мқҙмғҒмңјлЎң ліҖкІҪ
  selector:
    matchLabels:
      # TODO: name ліҖкІҪ мӢң app лқјлІЁлҸ„ лҸҷмқјн•ҳкІҢ л§һм¶°м•ј н•Ё
      app: account-backend
  template:
    metadata:
      labels:
        app: account-backend
    spec:
      containers:
        - name: account-backend
          # TODO: л°°нҸ¬ мӢң мөңмӢ  мқҙлҜём§Җ нғңк·ёлЎң м—…лҚ°мқҙнҠё
          image: 727646470302.dkr.ecr.ap-northeast-2.amazonaws.com/team5/ecr/qket:backend-7.3.2
          imagePullPolicy: Always
          ports:
            - containerPort: 8080

          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  # TODO: dev/prod лі„лЎң лӢӨлҘё Secret мқҙлҰ„ мӮ¬мҡ©
                  # prod: my-app-secrets-prod / dev: my-app-secrets-dev
                  name: my-app-secrets
                  key: DB_HOST

            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: my-app-secrets
                  key: DB_PORT

            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: my-app-secrets
                  key: DB_NAME

            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: my-app-secrets
                  key: DB_USERNAME

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: my-app-secrets
                  key: DB_PASSWORD

            - name: SPRING_DATA_REDIS_HOST
              # TODO: ElastiCache мӮ¬мҡ© мӢң м—”л“ңнҸ¬мқёнҠёлЎң ліҖкІҪ, нҒҙлҹ¬мҠӨн„° лӮҙ Redis мӮ¬мҡ© мӢң "redis" мң м§Җ
              value: redis

            - name: SPRING_DATA_REDIS_PORT
              value: "6379"

---
apiVersion: v1
kind: Service
metadata:
  # TODO: nameмқ„ springboot-serviceлЎң ліҖкІҪ вҖ” next.config.mjsмқҳ BACKEND_URL кё°ліёк°’кіј мқјм№ҳмӢңмјңм•ј н•Ё
  name: account-backend-service
  # TODO: namespace м¶”к°Җ (DeploymentмҷҖ лҸҷмқј)
spec:
  type: ClusterIP  # мҷёл¶Җ л…ём¶ң м—ҶмқҢ вҖ” Next.js лӮҙл¶Җ н”„лЎқмӢңлЎңл§Ң м ‘к·ј
  selector:
    app: account-backend
  ports:
    - port: 80
      targetPort: 8080

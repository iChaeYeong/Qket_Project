# =========================================================
# prod 백엔드 — 같은 namespace(qKet-prod) 에서만 인바운드 허용
# dev Next.js → prod Spring Boot 크로스 접근 차단
# =========================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-allow-same-namespace
  namespace: qKet-prod
spec:
  podSelector:
    matchLabels:
      app: account-backend   # TODO: backend name 변경 시 여기도 맞춰서 수정
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: qKet-prod   # prod namespace 내부 Pod만 허용
      ports:
        - port: 8080

---
# =========================================================
# dev 백엔드 — 같은 namespace(qKet-dev) 에서만 인바운드 허용
# =========================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-allow-same-namespace
  namespace: qKet-dev   # TODO: namespace_qKet.yaml의 dev namespace 이름과 일치시킬 것
spec:
  podSelector:
    matchLabels:
      app: account-backend   # TODO: backend name 변경 시 여기도 맞춰서 수정
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: qKet-dev
      ports:
        - port: 8080

---
# =========================================================
# prod Redis — 같은 namespace 내부에서만 접근 허용
# =========================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-allow-same-namespace
  namespace: qKet-prod
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: qKet-prod
      ports:
        - port: 6379

---
# =========================================================
# dev Redis — 같은 namespace 내부에서만 접근 허용
# =========================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-allow-same-namespace
  namespace: qKet-dev
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: qKet-dev
      ports:
        - port: 6379

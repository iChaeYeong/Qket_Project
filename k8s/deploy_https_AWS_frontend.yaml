apiVersion: apps/v1
kind: Deployment
metadata:
  name: REMOVED-frontend

spec:
  revisionHistoryLimit: 2
  replicas: 1

  selector:
    matchLabels:
      app: REMOVED-frontend

  template:
    metadata:
      labels:
        app: REMOVED-frontend

    spec:
      containers:
        - name: REMOVED-frontend
          image: 727646470302.dkr.ecr.ap-northeast-2.amazonaws.com/team5/ecr/REMOVED:frontend-7.1
          imagePullPolicy: Always

          ports:
            - containerPort: 3000

          resources:
            limits:
              cpu: "1"
              memory: "500Mi"
            requests:
              cpu: "0.5"
              memory: "250Mi"

          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: my-app-secrets
                  key: DB_HOST

            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: my-app-secrets
                  key: DB_PORT

            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: my-app-secrets
                  key: DB_NAME

            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: my-app-secrets
                  key: DB_USERNAME

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: my-app-secrets
                  key: DB_PASSWORD

          # livenessProbe:
          #   httpGet:
          #     path: /actuator/health/liveness
          #     port: 8080
          #   initialDelaySeconds: 100
          #   periodSeconds: 20

          # readinessProbe:
          #   httpGet:
          #     path: /actuator/health/readiness
          #     port: 8080
          #   initialDelaySeconds: 100
          #   periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: REMOVED-frontend-service

spec:
  type: ClusterIP

  ports:
    - port: 80
      targetPort: 3000

  selector:
    app: REMOVED-frontend

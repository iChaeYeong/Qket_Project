# =========================================================
# 사용법:
#   cp env_qKet.example.yaml env_qKet.yaml
#   env_qKet.yaml 에 실제 값 채운 후 → kubectl apply -f env_qKet.yaml
#   env_qKet.yaml 은 .gitignore 에 추가할 것 (실제 값 Git 노출 금지)
# =========================================================

# =========================================================
# Secret — 민감한 정보 (비밀번호, 엔드포인트)
# =========================================================

# DB Secret
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: db-secrets
  namespace: qket-prod
stringData:
  DB_HOST: ""       # RDS 엔드포인트 (application.yml: ${DB_HOST})
  DB_USERNAME: ""   # DB 유저명    (application.yml: ${DB_USERNAME})
  DB_PASSWORD: ""   # DB 비밀번호  (application.yml: ${DB_PASSWORD})

---
# Redis Secret
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: redis-secrets
  namespace: qket-prod
stringData:
  REDIS_HOST: ""    # ElastiCache 엔드포인트 (application.yml: ${REDIS_HOST})

---
# =========================================================
# ConfigMap — 민감하지 않은 일반 설정값 (Git에 올려도 됨)
# =========================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: qket-prod
data:
  DB_PORT: "3306"               # application.yml: ${DB_PORT}
  DB_NAME: "qket"               # application.yml: ${DB_NAME}
  REDIS_PORT: "6379"            # application.yml: ${REDIS_PORT}
  BACKEND_URL: "http://springboot-service"  # frontend Next.js → backend 내부 주소

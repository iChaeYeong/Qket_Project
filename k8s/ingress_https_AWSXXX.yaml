apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: account-backend-ingress
  annotations:
    cert-manager.io/cluster-issuer: my-issuer
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app.jun979.click
      secretName: app-jun979-click-tls
  rules:
    - host: app.jun979.click
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: account-backend-service
                port:
                  number: 80
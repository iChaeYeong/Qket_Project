# =========================================================
# 사용법:
#   cp k8s/dev/env_qKet.example.yaml k8s/dev/env_qKet.yaml
#   env_qKet.yaml 에 실제 값 채운 후 → kubectl apply -f k8s/dev/env_qKet.yaml
#   env_qKet.yaml 은 .gitignore 에 추가할 것 (실제 값 Git 노출 금지)
# =========================================================

# =========================================================
# Secret — 민감한 정보 (비밀번호, 엔드포인트)
# =========================================================

apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: db-secrets
  namespace: qket-dev
stringData:
  DB_HOST: ""       # RDS 엔드포인트 (application.yml: ${DB_HOST})
  DB_USERNAME: ""   # DB 유저명    (application.yml: ${DB_USERNAME})
  DB_PASSWORD: ""   # DB 비밀번호  (application.yml: ${DB_PASSWORD})

---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: redis-secrets
  namespace: qket-dev
stringData:
  REDIS_HOST: ""    # ElastiCache 엔드포인트 (application.yml: ${REDIS_HOST})

---
# =========================================================
# ConfigMap — 민감하지 않은 일반 설정값
# =========================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: qket-dev
data:
  DB_PORT: "3306"
  DB_NAME: "qket"
  REDIS_PORT: "6379"
  BACKEND_URL: "http://qket-backend-service"

# =========================================================
# dev 전용 Redis Deployment
# prod 환경에서는 ElastiCache 사용 → 이 파일 불필요
# =========================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: qket-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: qket-dev
spec:
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: redis
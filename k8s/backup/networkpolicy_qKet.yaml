############################
# networkpolicy_qKet.yaml  #
############################

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy # NetworkPolicy - pod 간 트래픽 허용/차단 하는 방화벽
metadata: #           frontend -> springboot 중간 감시자
  name: backend-allow-same-namespace
  namespace: qket-prod
spec:
  podSelector:
    matchLabels:
      app: qket-backend # Deployment의 template.metadata.label 값
  policyTypes: # 종류:  Ingress — 들어오는 트래픽 제어 (다른 Pod이 이 Pod에 접근하는 것)
    - Ingress #        Egress — 나가는 트래픽 제어 (이 Pod이 다른 곳에 접근하는 것)
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: qKet-prod # 지정한 namespace 안에서만 트래픽 허용
      ports:
        - port: 8080

---
# qket-dev
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-allow-same-namespace
  namespace: qket-dev
spec:
  podSelector:
    matchLabels:
      app: qket-backend # Deployment의 template.metadata.label 값
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: qket-dev # 지정한 namespace 안에서만 트래픽 허용
      ports:
        - port: 8080
